<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jobs & Internships | HireNest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="site-header">
    <div class="container">
      <nav class="navbar">

        <!-- Left -->
        <div class="nav-left">
          <a href="job-list.html">Browse Jobs</a>
          <a href="post-job.html">Post a Job</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        <a href="my-applications.html">My Applications</a>

        </div>

        <!-- Center Logo -->
        <div class="nav-center">
          <a class="brand-center" href="../index.html">
            <img src="../assets/images/logo.png" alt="HireNest Logo">
            <div class="brand-text">
              <strong>HireNest</strong>
              <span>Smart Recruitment Platform</span>
            </div>
          </a>
        </div>

        <!-- Right -->
        <div class="nav-right">
          <a class="btn btn-ghost" href="login.html">Login</a>
          <a class="btn btn-primary" href="register.html">Create Account</a>
        </div>

      </nav>
    </div>
  </header>


  <!-- ================= MAIN ================= -->
  <main class="container" style="padding:60px 0;">

    <!-- Page Title -->
    <h1 style="font-size:32px; font-weight:900;">
      Explore Jobs & Internships
    </h1>

    <p style="margin-top:8px; color:rgba(255,255,255,0.7); max-width:600px;">
      Browse job and internship opportunities posted by recruiters.
    </p>


    <!-- ================= JOB FILTERS ================= -->
    <div class="job-filters" style="margin-top:25px; display:flex; gap:12px; flex-wrap:wrap;">

      <input
        type="text"
        id="searchJob"
        placeholder="Search job title..."
        style="padding:10px 14px; border-radius:6px; border:1px solid #444;"
      >

      <select
        id="filterLocation"
        style="padding:10px 14px; border-radius:6px; border:1px solid #444;"
      >
        <option value="">All Locations</option>
        <option value="Ahmedabad">Ahmedabad</option>
        <option value="Remote">Remote</option>
        <option value="Bangalore">Bangalore</option>
      </select>

      <select
        id="filterType"
        style="padding:10px 14px; border-radius:6px; border:1px solid #444;"
      >
        <option value="">All Types</option>
        <option value="Internship">Internship</option>
        <option value="Full-time">Full-time</option>
        <option value="Part-time">Part-time</option>
      </select>

    </div>


    <!-- ================= JOB LIST ================= -->
    <div
      id="jobContainer"
      style="
      margin-top:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    "
    >

    </div>


    <!-- ================= EMPTY STATE ================= -->
    <div id="noJobsMessage" style="margin-top:40px; color:rgba(255,255,255,0.6);">

      <h3>No jobs or internships posted yet.</h3>
      <p>Recruiters will post opportunities here soon.</p>

    </div>

  </main>


  <!-- ================= JS ================= -->
  <script src="../assets/js/jobs.js"></script>

</body>

</html>
