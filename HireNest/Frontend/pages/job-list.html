<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jobs & Internships | HireNest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="site-header">
    <div class="container">
      <nav class="navbar">

        <!-- Left -->
        <div class="nav-left">
          <a href="job-list.html">Browse Jobs</a>
          <a href="post-job.html">Post a Job</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        <a href="my-applications.html">My Applications</a>

        </div>

        <!-- Center Logo -->
        <div class="nav-center">
          <a class="brand-center" href="../index.html">
            <img src="../assets/images/logo.png" alt="HireNest Logo">
            <div class="brand-text">
              <strong>HireNest</strong>
              <span>Smart Recruitment Platform</span>
            </div>
          </a>
        </div>

        <!-- Right -->
        <div class="nav-right">
          <a class="btn btn-ghost" href="login.html">Login</a>
          <a class="btn btn-primary" href="register.html">Create Account</a>
        </div>

      </nav>
    </div>
  </header>


  <!-- ================= MAIN ================= -->
  <main class="container" style="padding:60px 0;">

    <!-- Page Title -->
    <h1 style="font-size:32px; font-weight:900;">
      Explore Jobs & Internships
    </h1>

    <p style="margin-top:8px; color:rgba(255,255,255,0.7); max-width:600px;">
      Browse job and internship opportunities posted by recruiters.
    </p>


    <!-- ================= JOB FILTERS ================= -->
    <div class="job-filters" style="margin-top:25px; display:grid; gap:12px;">

      <!-- Search Bar -->
      <input
        type="text"
        id="searchJob"
        placeholder="Search by job title, company, or skills..."
        style="padding:12px 16px; border-radius:8px; border:1px solid #444; background:#1f2937; color:white; font-size:15px;"
      >

      <!-- Filter Row -->
      <div style="display:flex; gap:12px; flex-wrap:wrap;">

        <select
          id="filterLocation"
          style="padding:10px 14px; border-radius:6px; border:1px solid #444; background:#1f2937; color:white; min-width:150px;"
        >
          <option value="">All Locations</option>
          <option value="Remote">Remote</option>
          <option value="Ahmedabad">Ahmedabad</option>
          <option value="Bangalore">Bangalore</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Delhi">Delhi</option>
          <option value="Pune">Pune</option>
          <option value="Hyderabad">Hyderabad</option>
        </select>

        <select
          id="filterType"
          style="padding:10px 14px; border-radius:6px; border:1px solid #444; background:#1f2937; color:white; min-width:150px;"
        >
          <option value="">All Types</option>
          <option value="Internship">Internship</option>
          <option value="Full-time">Full-time</option>
          <option value="Part-time">Part-time</option>
          <option value="Contract">Contract</option>
        </select>

        <select
          id="sortFilter"
          style="padding:10px 14px; border-radius:6px; border:1px solid #444; background:#1f2937; color:white; min-width:150px;"
        >
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>

      </div>

      <!-- Jobs Count -->
      <p id="jobsCount" style="color:rgba(255,255,255,0.7); margin-top:8px;">Loading...</p>

    </div>


    <!-- ================= JOB LIST ================= -->
    <div
      id="jobContainer"
      style="
      margin-top:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    "
    >

    </div>


    <!-- ================= EMPTY STATE ================= -->
    <div id="noJobsMessage" style="margin-top:40px; color:rgba(255,255,255,0.6);">

      <h3>No jobs or internships posted yet.</h3>
      <p>Recruiters will post opportunities here soon.</p>

    </div>

    <!-- ================= PAGINATION ================= -->
    <div id="paginationContainer" style="margin-top:30px; display:flex; justify-content:center; gap:8px; align-items:center;">
      <!-- Pagination buttons will be inserted here -->
    </div>

  </main>

  <style>
    .page-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1f2937;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .page-btn:hover {
      background: #7C5CFF;
      border-color: #7C5CFF;
    }
    .page-btn.active {
      background: #7C5CFF;
      border-color: #7C5CFF;
    }
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>


  <!-- ================= JS ================= -->
  <script src="../assets/js/auth-guard.js"></script>
  <script src="../assets/js/jobs.js"></script>
  <script>
    // Update navbar on load
    updateNavbar();
  </script>

</body>

</html>
